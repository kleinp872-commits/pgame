<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨守 · Ink Guard</title>
<style>
  :root{
    --paper:#e9e2cf;
    --paper-2:#ded4ba;
    --ink:#2c2620;
    --ink-soft:#57503f;
    --seal:#a13a2c;
    --seal-dark:#7c2a1f;
    --line:#b7ab8d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--paper);
    font-family:"Songti SC","STSong","Noto Serif SC",serif;
    touch-action:none;
  }
  #stage{position:relative; width:100vw; height:100vh; overflow:hidden;}
  canvas{position:absolute; top:0; left:0; display:block;}

  .hud{position:absolute; z-index:5; color:var(--ink); pointer-events:none;}
  .title{
    top:16px; left:16px; font-size:18px; letter-spacing:6px; font-weight:700;
  }
  .title small{display:block; font-size:9px; letter-spacing:3px; color:var(--ink-soft); font-weight:400; margin-top:2px;}

  .score{
    top:12px; left:50%; transform:translateX(-50%); text-align:center;
  }
  .score .tide{font-size:10px; letter-spacing:5px; color:var(--ink-soft);}
  .score .num{font-size:26px; letter-spacing:3px; font-weight:600; margin-top:2px;}

  .lives{top:16px; right:16px; display:flex; gap:6px;}
  .lives .dot{
    width:13px; height:13px; border-radius:2px;
    background:var(--seal); box-shadow:inset 0 0 0 1.5px rgba(233,226,207,.35);
  }
  .lives .dot.lost{
    background:transparent; border:1.5px solid var(--ink-soft); opacity:.4;
    animation:sealBreak .5s ease-out;
  }
  @keyframes sealBreak{
    0%{transform:scale(1) rotate(0); background:var(--seal); opacity:1;}
    60%{transform:scale(1.35) rotate(14deg); opacity:.7;}
    100%{transform:scale(1) rotate(0); opacity:.4;}
  }
  .score .num.bump{animation:bump .25s ease-out;}
  @keyframes bump{0%{transform:scale(1);}40%{transform:scale(1.18);}100%{transform:scale(1);}}
  .healthbar.hit{animation:hpHit .4s ease-out;}
  .healthbar.hit .healthbar-fill{background:var(--seal);}
  @keyframes hpHit{0%,50%{transform:translateX(-2px);}25%,75%{transform:translateX(2px);}100%{transform:none;}}
  .comboTxt{
    top:26%; left:0; right:0; text-align:center; font-size:24px; font-weight:700;
    letter-spacing:4px; color:var(--seal-dark); opacity:0; transition:opacity .3s;
  }
  .comboTxt.pop{animation:comboPop .3s ease-out forwards;}
  @keyframes comboPop{0%{opacity:0;transform:scale(.6);}60%{opacity:1;transform:scale(1.15);}100%{opacity:1;transform:scale(1);}}
  .nameplate{
    top:34%; left:0; right:0; text-align:center; font-size:20px; font-weight:700;
    letter-spacing:6px; color:var(--ink); opacity:0; transition:opacity .4s;
  }
  .nameplate.show{opacity:1;}

  .btns{top:44px; right:16px; display:flex; gap:8px; pointer-events:auto;}
  .rbtn{
    width:26px; height:26px; border-radius:50%; background:var(--seal);
    border:none; color:var(--paper); font-size:12px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .rbtn:active{filter:brightness(0.9);}
  .rbtn.muted{opacity:.4; text-decoration:line-through;}

  .seal-btn{
    bottom:16px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none;
  }
  .seal-box{
    width:40px; height:40px; background:var(--seal); border-radius:4px;
    display:flex; align-items:center; justify-content:center; color:var(--paper);
    font-size:20px; font-weight:700; box-shadow:0 2px 6px rgba(0,0,0,.25);
    transition:transform .15s;
  }
  .seal-box.armed{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

  .wavebar{position:absolute; bottom:0; left:0; height:4px; width:100%; background:rgba(0,0,0,0.08); z-index:5;}
  .wavebar-fill{
    height:100%; width:0%; transition:width .3s;
    background:linear-gradient(90deg,var(--seal-dark),var(--seal),var(--seal-dark));
    background-size:200% 100%; animation:inkflow 3s linear infinite;
  }
  @keyframes inkflow{from{background-position:0 0;}to{background-position:200% 0;}}

  .healthbar{position:absolute; left:10px; top:80px; bottom:80px; width:6px; background:rgba(0,0,0,0.08); border-radius:3px; z-index:5;}
  .healthbar-fill{position:absolute; bottom:0; left:0; width:100%; background:var(--ink-soft); border-radius:3px; transition:height .3s;}

  .prompt{
    position:absolute; z-index:5; color:var(--seal-dark); font-size:12px; letter-spacing:2px;
    text-align:center; pointer-events:none; font-weight:600;
  }
  .flash{
    position:absolute; z-index:4; color:var(--seal); font-size:15px; font-weight:700;
    letter-spacing:3px; pointer-events:none; opacity:0; text-shadow:0 0 6px rgba(255,255,255,.6);
  }

  .overlay{
    position:absolute; inset:0; z-index:20; display:none; align-items:center; justify-content:center;
    flex-direction:column; background:rgba(233,226,207,0.92); text-align:center; color:var(--ink);
  }
  .overlay.show{display:flex;}
  .overlay h1{font-size:34px; letter-spacing:10px; margin:0 0 6px;}
  .overlay p{font-size:13px; color:var(--ink-soft); letter-spacing:2px; margin:2px 0 22px;}
  .overlay .go-score{font-size:16px; letter-spacing:3px; margin-bottom:26px;}
  .go-score .record{color:var(--seal); font-weight:700; letter-spacing:4px;}
  .startbtn{
    background:var(--seal); color:var(--paper); border:none; padding:12px 34px;
    font-size:14px; letter-spacing:6px; border-radius:2px; cursor:pointer; font-family:inherit;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .startbtn:active{filter:brightness(0.92);}
  .hint{margin-top:20px; font-size:11px; color:var(--ink-soft); letter-spacing:1.5px; max-width:280px; line-height:1.7;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bg"></canvas>
  <canvas id="stain"></canvas>
  <canvas id="game"></canvas>

  <div class="hud title">墨守<small>INK GUARD</small></div>

  <div class="hud score">
    <div class="tide" id="tideLabel">TIDE 1</div>
    <div class="num" id="scoreNum">0</div>
  </div>

  <div class="hud lives" id="lives">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="btns">
    <button class="rbtn" id="pauseBtn">❚❚</button>
    <button class="rbtn" id="restartBtn">↺</button>
    <button class="rbtn" id="muteBtn">音</button>
  </div>

  <div class="healthbar"><div class="healthbar-fill" id="hpFill" style="height:100%"></div></div>

  <div class="hud seal-btn">
    <div class="seal-box" id="sealBox">守</div>
  </div>

  <div class="wavebar"><div class="wavebar-fill" id="waveFill"></div></div>

  <div class="hud comboTxt" id="comboTxt"></div>
  <div class="hud nameplate" id="namePlate"></div>

  <div class="prompt" id="promptText" style="display:none;">Trace to cast · Thunder</div>
  <div class="flash" id="flashText"></div>

  <div class="overlay show" id="startOverlay">
    <h1>墨守</h1>
    <p>I N K &nbsp; G U A R D</p>
    <button class="startbtn" id="startBtn">開始 · PLAY</button>
    <div class="hint">用手指或滑鼠劃過墨靈即可斬殺，不同墨靈需要劃中的次數不同。<br>螢幕出現虛線圖案時，沿其軌跡描繪以施展雷擊。<br>每關消滅足夠數量即可過關，敵人種類會隨等級增加。<br>讓墨靈越過紅印線會損失生命。</div>
  </div>

  <div class="overlay" id="endOverlay">
    <h1>破 守</h1>
    <p>THE INK HAS BROKEN THROUGH</p>
    <div class="go-score" id="finalScore">0</div>
    <button class="startbtn" id="retryBtn">再 守 · RETRY</button>
  </div>
</div>

<script>
(function(){
  const stage = document.getElementById('stage');
  const bgCanvas = document.getElementById('bg');
  const stainCanvas = document.getElementById('stain');
  const gCanvas = document.getElementById('game');
  const bgCtx = bgCanvas.getContext('2d');
  const stainCtx = stainCanvas.getContext('2d');
  const gctx = gCanvas.getContext('2d');

  // ---------- audio: synthesized sfx ----------
  let audioCtx=null, masterGain=null, muted=false;
  try{ muted = localStorage.getItem('inkguard_muted')==='1'; }catch(e){}
  function ensureAudio(){
    if(audioCtx){ if(audioCtx.state==='suspended') audioCtx.resume(); return; }
    try{
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = muted?0:0.9;
      masterGain.connect(audioCtx.destination);
    }catch(e){ audioCtx=null; }
  }
  function noiseBuf(dur){
    const n = Math.floor(audioCtx.sampleRate*dur);
    const buf = audioCtx.createBuffer(1,n,audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    return buf;
  }
  function env(gainNode,t0,peak,dur){
    gainNode.gain.setValueAtTime(0.0001,t0);
    gainNode.gain.linearRampToValueAtTime(peak,t0+0.008);
    gainNode.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  }
  function playNoise(dur,filterType,f0,f1,peak){
    const t0=audioCtx.currentTime;
    const src=audioCtx.createBufferSource(); src.buffer=noiseBuf(dur);
    const flt=audioCtx.createBiquadFilter(); flt.type=filterType;
    flt.frequency.setValueAtTime(f0,t0);
    flt.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t0+dur);
    const g=audioCtx.createGain(); env(g,t0,peak,dur);
    src.connect(flt).connect(g).connect(masterGain);
    src.start(t0); src.stop(t0+dur+0.05);
  }
  function playTone(type,f0,f1,dur,peak,delay){
    const t0=audioCtx.currentTime+(delay||0);
    const o=audioCtx.createOscillator(); o.type=type;
    o.frequency.setValueAtTime(f0,t0);
    if(f1) o.frequency.exponentialRampToValueAtTime(f1,t0+dur);
    const g=audioCtx.createGain(); env(g,t0,peak,dur);
    o.connect(g).connect(masterGain);
    o.start(t0); o.stop(t0+dur+0.05);
  }
  const sfx = {
    _ok(){ return audioCtx && !muted; },
    slash(){ if(!this._ok())return; playNoise(0.08,'bandpass',3400,1500,0.25); },
    kill(){ if(!this._ok())return; playNoise(0.09,'bandpass',3000,1200,0.3); playTone('sine',130,70,0.12,0.5); },
    thunder(){ if(!this._ok())return;
      playNoise(0.03,'highpass',3000,3000,0.6);
      playNoise(1.2,'lowpass',800,90,0.55);
      playTone('sine',52,40,1.1,0.5);
    },
    hurt(){ if(!this._ok())return; playTone('triangle',220,110,0.3,0.4); },
    clear(){ if(!this._ok())return;
      [523,587,659,784,880].forEach((f,i)=>playTone('sine',f,0,0.5,0.22,i*0.09));
    },
    chime(){ if(!this._ok())return; playTone('sine',880,0,1.4,0.3); playTone('sine',1760,0,1.0,0.08); },
    combo(n){ if(!this._ok())return; playTone('sine',600*Math.pow(1.059,Math.min(n,12)),0,0.09,0.18); }
  };

  // ---------- persist: best score ----------
  function loadBest(){
    try{ return JSON.parse(localStorage.getItem('inkguard_best'))||{score:0,level:1}; }
    catch(e){ return {score:0,level:1}; }
  }
  function saveBest(b){
    try{ localStorage.setItem('inkguard_best', JSON.stringify(b)); }catch(e){}
  }

  let W=0,H=0,DPR=1;
  function resize(){
    W = stage.clientWidth; H = stage.clientHeight;
    DPR = Math.min(window.devicePixelRatio||1, 2);
    [bgCanvas,stainCanvas,gCanvas].forEach(c=>{
      c.width = W*DPR; c.height = H*DPR;
      c.style.width=W+'px'; c.style.height=H+'px';
    });
    bgCtx.setTransform(DPR,0,0,DPR,0,0);
    stainCtx.setTransform(DPR,0,0,DPR,0,0);
    gctx.setTransform(DPR,0,0,DPR,0,0);
    makePaper();
    makeFog();
    drawBackground();
  }
  window.addEventListener('resize', resize);

  // ---------- background: ink-wash mountains + ripple lines ----------
  function mountainPath(ctx, baseY, amp, seed, color){
    ctx.beginPath();
    ctx.moveTo(0,H);
    ctx.lineTo(0, baseY);
    const pts = 8;
    for(let i=0;i<=pts;i++){
      const x = (W/pts)*i;
      const y = baseY + Math.sin(i*1.3+seed)*amp + Math.sin(i*0.6+seed*2)*amp*0.5;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
  function drawBackground(){
    bgCtx.clearRect(0,0,W,H);
    bgCtx.fillStyle = '#e9e2cf';
    bgCtx.fillRect(0,0,W,H);
    mountainPath(bgCtx, H*0.28, 18, 1, 'rgba(180,170,143,0.35)');
    mountainPath(bgCtx, H*0.36, 24, 3, 'rgba(170,159,131,0.3)');
    mountainPath(bgCtx, H*0.46, 14, 5, 'rgba(150,138,110,0.28)');
    // ripple lines across mid
    bgCtx.strokeStyle = 'rgba(90,80,60,0.25)';
    bgCtx.lineWidth = 1;
    for(let r=0;r<3;r++){
      const y = H*0.58 + r*10;
      bgCtx.beginPath();
      for(let x=0;x<=W;x+=6){
        const yy = y + Math.sin(x*0.02+r)*2;
        if(x===0) bgCtx.moveTo(x,yy); else bgCtx.lineTo(x,yy);
      }
      bgCtx.stroke();
    }
    // base line (defense line)
    bgCtx.strokeStyle = 'rgba(161,58,44,0.5)';
    bgCtx.lineWidth = 1.5;
    bgCtx.setLineDash([2,4]);
    bgCtx.beginPath();
    bgCtx.moveTo(0, baseY());
    bgCtx.lineTo(W, baseY());
    bgCtx.stroke();
    bgCtx.setLineDash([]);
    if(paperCanvas) bgCtx.drawImage(paperCanvas,0,0,W,H);
  }
  function baseY(){ return H*0.82; }

  // ---------- paper texture (offscreen) ----------
  let paperCanvas=null;
  function makePaper(){
    paperCanvas=document.createElement('canvas');
    paperCanvas.width=W; paperCanvas.height=H;
    const p=paperCanvas.getContext('2d');
    const fibers=Math.floor(W*H/900);
    for(let i=0;i<fibers;i++){
      const x=Math.random()*W, y=Math.random()*H, a=Math.random()*Math.PI, l=3+Math.random()*8;
      p.strokeStyle='rgba(120,105,80,'+(0.04+Math.random()*0.05).toFixed(3)+')';
      p.beginPath(); p.moveTo(x,y); p.lineTo(x+Math.cos(a)*l, y+Math.sin(a)*l); p.stroke();
    }
    for(let i=0;i<40;i++){
      const x=Math.random()*W,y=Math.random()*H,r=20+Math.random()*60;
      const g=p.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,'rgba(160,145,115,0.05)'); g.addColorStop(1,'rgba(160,145,115,0)');
      p.fillStyle=g; p.beginPath(); p.arc(x,y,r,0,Math.PI*2); p.fill();
    }
  }

  // ---------- stain layer ----------
  let stainFadeT=0;
  function addStain(x,y){
    const r = 14+Math.random()*10;
    const g = stainCtx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(60,52,40,0.10)');
    g.addColorStop(0.7,'rgba(60,52,40,0.05)');
    g.addColorStop(1,'rgba(60,52,40,0)');
    stainCtx.fillStyle=g;
    stainCtx.beginPath(); stainCtx.arc(x,y,r,0,Math.PI*2); stainCtx.fill();
  }
  function clearStains(){
    stainCtx.save(); stainCtx.setTransform(1,0,0,1,0,0);
    stainCtx.clearRect(0,0,stainCanvas.width,stainCanvas.height);
    stainCtx.restore();
  }
  function fadeStains(){
    stainCtx.save(); stainCtx.setTransform(1,0,0,1,0,0);
    stainCtx.globalCompositeOperation='destination-out';
    stainCtx.globalAlpha=0.12;
    stainCtx.fillStyle='#000';
    stainCtx.fillRect(0,0,stainCanvas.width,stainCanvas.height);
    stainCtx.restore();
  }

  // ---------- ink shards (death dissolve, ring pool) ----------
  const S_MAX=64; let sCur=0;
  const shards=[];
  for(let i=0;i<S_MAX;i++) shards.push({alive:false});
  function spawnShards(en, ang){
    const n = 4+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){
      const poly=[]; const pn=5+Math.floor(Math.random()*3);
      const rr = en.r*(0.35+Math.random()*0.4);
      for(let k=0;k<pn;k++){
        const a=(k/pn)*Math.PI*2;
        poly.push({x:Math.cos(a)*rr*(0.6+Math.random()*0.7), y:Math.sin(a)*rr*(0.6+Math.random()*0.7)});
      }
      const a = ang + (Math.random()-0.5)*1.2;
      const s = shards[sCur]; sCur=(sCur+1)%S_MAX;
      s.alive=true; s.x=en.x; s.y=en.y;
      s.vx=Math.cos(a)*(0.06+Math.random()*0.12);
      s.vy=Math.sin(a)*(0.06+Math.random()*0.10)-0.05;
      s.rot=Math.random()*Math.PI*2; s.vr=(Math.random()-0.5)*0.01;
      s.poly=poly; s.life=600; s.maxLife=600; s.grow=0.4+Math.random()*0.3;
    }
  }

  // ---------- lightning ----------
  let flashWhite=0, bolts=[];
  function boltPath(x0,y0,x1,y1,depth){
    let pts=[{x:x0,y:y0},{x:x1,y:y1}];
    for(let d=0; d<depth; d++){
      const next=[pts[0]];
      for(let i=1;i<pts.length;i++){
        const a=pts[i-1], b=pts[i];
        next.push({x:(a.x+b.x)/2 + (Math.random()-0.5)*(b.y-a.y)*0.5,
                   y:(a.y+b.y)/2 + (Math.random()-0.5)*10}, b);
      }
      pts=next;
    }
    return pts;
  }
  function spawnLightning(){
    flashWhite = 120;
    const x = W*0.3+Math.random()*W*0.4;
    const main = boltPath(x,-10, x+(Math.random()-0.5)*80, baseY(), 5);
    bolts.push({pts:main, life:250, maxLife:250, w:3});
    for(let i=0;i<3;i++){
      const p = main[2+Math.floor(Math.random()*(main.length-4))];
      bolts.push({pts:boltPath(p.x,p.y, p.x+(Math.random()-0.5)*160, p.y+80+Math.random()*120, 3),
                  life:200, maxLife:200, w:1.5});
    }
  }

  // ---------- fog (offscreen, drifting) ----------
  let fogCanvas=null, fogs=[];
  function makeFog(){
    fogCanvas=document.createElement('canvas');
    fogCanvas.width=420; fogCanvas.height=120;
    const f=fogCanvas.getContext('2d');
    for(let i=0;i<7;i++){
      const x=40+Math.random()*340, y=30+Math.random()*60, r=40+Math.random()*50;
      const g=f.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,'rgba(233,228,214,0.16)'); g.addColorStop(1,'rgba(233,228,214,0)');
      f.fillStyle=g; f.beginPath(); f.arc(x,y,r,0,Math.PI*2); f.fill();
    }
    fogs=[{x:-100,y:H*0.30,v:0.006,s:1.4},{x:W*0.5,y:H*0.42,v:-0.004,s:1.9},{x:W*0.2,y:H*0.55,v:0.003,s:2.4}];
  }

  // ---------- level transition ink wave ----------
  function drawInkWave(prog){
    const bandW = W*0.7+220;
    const total = W + bandW + 440;
    const sweep = Math.min(1, prog/0.55);
    const lead = -220 + sweep*total;
    gctx.fillStyle='rgba(28,24,19,0.94)';
    gctx.beginPath();
    gctx.moveTo(lead + Math.sin(prog*14)*24, -20);
    for(let y=0;y<=H;y+=20) gctx.lineTo(lead + Math.sin(y*0.045+prog*14)*24, y);
    gctx.lineTo(lead + Math.sin(H*0.045+prog*14)*24, H+20);
    gctx.lineTo(lead-bandW + Math.sin(H*0.03+prog*10)*30, H+20);
    for(let y=H;y>=0;y-=20) gctx.lineTo(lead-bandW + Math.sin(y*0.03+prog*10)*30, y);
    gctx.closePath(); gctx.fill();
    if(prog>0.25 && prog<0.85){
      const ta = Math.sin((prog-0.25)/0.6*Math.PI);
      gctx.fillStyle='rgba(233,226,207,'+ta.toFixed(3)+')';
      gctx.font='700 44px "Songti SC","STSong","Noto Serif SC",serif';
      gctx.textAlign='center';
      gctx.fillText('第 '+(level+1)+' 關', W/2, H*0.45);
      gctx.textAlign='start';
    }
  }

  // ---------- score floaters (ring pool) ----------
  const F_MAX=32; let fCur=0;
  const floaters=[];
  for(let i=0;i<F_MAX;i++) floaters.push({alive:false});
  function spawnFloater(x,y,txt){
    const f = floaters[fCur]; fCur=(fCur+1)%F_MAX;
    f.alive=true; f.x=x; f.y=y; f.txt=txt; f.life=700; f.maxLife=700;
  }

  // ---------- new enemy nameplate ----------
  const ANIMAL_NAMES={tadpole:'墨蝌',octopus:'墨蛸',jellyfish:'墨蜇'};

  // ---------- juice: shake / hit-stop / vibrate ----------

  // ---------- game state ----------
  let score=0, lives=3, level=1, running=false, paused=false;

  let lastStrokeAngle=0;
  let thunderQueue=[], thunderT=0;

  function resetGame(){

  function applyLevelConfig(){

  function flash(msg){

  // ---------- enemies ----------
  const ANIMAL_DEFS = {
    tadpole:   { amp:14, rRange:[7,10],  speedMult:1.25 },
    octopus:   { amp:24, rRange:[13,17], speedMult:0.78 },
    jellyfish: { amp:30, rRange:[10,14], speedMult:0.62 }
  };

  // Each level defines which animals appear and how many strokes each needs.
  const LEVELS = [null,
    { animals:[ {type:'tadpole',hits:1,weight:1} ], goal:12, spawnInterval:1300 },
    { animals:[ {type:'tadpole',hits:1,weight:2}, {type:'octopus',hits:2,weight:1} ], goal:16, spawnInterval:1200 },
    { animals:[ {type:'tadpole',hits:1,weight:2}, {type:'jellyfish',hits:2,weight:1}, {type:'octopus',hits:2,weight:1} ], goal:20, spawnInterval:1100 },
    { animals:[ {type:'tadpole',hits:2,weight:2}, {type:'jellyfish',hits:2,weight:1}, {type:'octopus',hits:3,weight:1} ], goal:24, spawnInterval:1000 },
    { animals:[ {type:'tadpole',hits:2,weight:1}, {type:'jellyfish',hits:3,weight:1}, {type:'octopus',hits:4,weight:1} ], goal:28, spawnInterval:900 }
  ];
  function getLevelConfig(lvl){
    if(lvl < LEVELS.length) return LEVELS[lvl];
    const base = LEVELS[LEVELS.length-1];
    const extra = lvl - (LEVELS.length-1);
    return {
      animals: base.animals.map(a=>({...a, hits: a.hits + Math.floor(extra/2)})),
      goal: base.goal + extra*4,
      spawnInterval: Math.max(480, base.spawnInterval - extra*35)
    };
  }
  function pickWeighted(list){
    const total = list.reduce((s,a)=>s+a.weight,0);
    let r = Math.random()*total;
    for(const a of list){ r -= a.weight; if(r<=0) return a; }
    return list[list.length-1];
  }

  function spawnEnemy(){
    const cfg = getLevelConfig(level);
    const pick = pickWeighted(cfg.animals);
    const type = pick.type;
    const def = ANIMAL_DEFS[type];
    const amp = def.amp;
    const baseX = 30+amp + Math.random()*(W-60-amp*2);
    const speed = ((16 + level*2 + Math.random()*8) * def.speedMult) / 1000; // px/ms
    const [rMin,rMax] = def.rRange;
    enemies.push({
      x: baseX, y:-20, type, speed,
      baseX, swimAmp: amp,
      swimFreq: 0.0012 + Math.random()*0.0014, // radians/ms
      swimPhase: Math.random()*Math.PI*2,
      swimT: 0,
      r: rMin + Math.random()*(rMax-rMin),
      facing: 1, angle: 0,
      wobble: Math.random()*Math.PI*2,
      maxHits: pick.hits, hits: 0, ptsPerHit: 6 + pick.hits*2,
      hitCooldown: 0,
      alive:true, hitFlash:0
    });
  }

  function drawEnemy(e){
    gctx.save();
    gctx.translate(e.x,e.y);
    gctx.scale(e.facing, 1);
    gctx.rotate(e.facing>0 ? e.angle : -e.angle);
    const ink = e.hitFlash>0 ? 'rgba(161,58,44,0.85)' : 'rgba(24,21,17,0.88)';
    gctx.fillStyle = ink;
    gctx.strokeStyle = ink;
    const s = e.r/10; // scale factor around a ~10px base unit
    const flap = Math.sin(e.wobble*0.02 + e.y*0.15); // idle animation driver

    if(e.type==='tadpole'){
      // round head
      gctx.beginPath();
      gctx.arc(2.5*s,0, 4.4*s, 0, Math.PI*2);
      gctx.fill();
      // tapering, wiggling tail
      const tw = flap*3.2*s;
      gctx.beginPath();
      gctx.moveTo(-1.6*s,-1.6*s);
      gctx.quadraticCurveTo(-8*s, -1.2*s+tw, -13.5*s, 0.4*s-tw*0.5);
      gctx.quadraticCurveTo(-8*s, 1.6*s+tw*0.4, -1.6*s, 1.6*s);
      gctx.closePath();
      gctx.fill();
      // eyes (paper cutout)
      gctx.fillStyle = 'rgba(233,226,207,0.9)';
      gctx.beginPath(); gctx.arc(3.6*s,-1.6*s, 0.8*s, 0, Math.PI*2); gctx.fill();

    } else if(e.type==='octopus'){
      // bulbous mantle
      gctx.beginPath();
      gctx.ellipse(0,-1.8*s, 6.2*s, 5*s, 0, 0, Math.PI*2);
      gctx.fill();
      // eyes (paper cutout)
      gctx.fillStyle = 'rgba(233,226,207,0.9)';
      gctx.beginPath(); gctx.arc(-2.2*s,-2.2*s, 1*s, 0, Math.PI*2); gctx.fill();
      gctx.beginPath(); gctx.arc(2.2*s,-2.2*s, 1*s, 0, Math.PI*2); gctx.fill();
      // wavy tentacles
      gctx.strokeStyle = ink;
      gctx.lineCap = 'round';
      gctx.lineWidth = 1.7*s;
      const legs = 6;
      for(let i=0;i<legs;i++){
        const spread = -1 + (i/(legs-1))*2;
        const wig = Math.sin(e.wobble*0.02 + e.y*0.2 + i*1.1) * 2.6*s;
        gctx.beginPath();
        gctx.moveTo(spread*3.2*s, 2.6*s);
        gctx.quadraticCurveTo(spread*5*s+wig, 6.2*s, spread*4.2*s, 9.2*s+Math.abs(wig)*0.6);
        gctx.stroke();
      }

    } else { // jellyfish
      const pulse = 1 + 0.1*Math.sin(e.wobble*0.03 + e.y*0.12);
      gctx.globalAlpha = 0.8;
      // bell (dome)
      gctx.beginPath();
      gctx.arc(0,-1*s, 5.4*s*pulse, Math.PI, 0);
      gctx.quadraticCurveTo(4*s*pulse, 1.6*s, 0, 1.2*s);
      gctx.quadraticCurveTo(-4*s*pulse, 1.6*s, -5.4*s*pulse, -1*s);
      gctx.closePath();
      gctx.fill();
      gctx.globalAlpha = 1;
      // trailing tentacles
      gctx.strokeStyle = ink;
      gctx.lineCap = 'round';
      gctx.lineWidth = 1.3*s;
      const strands = 5;
      for(let i=0;i<strands;i++){
        const sx = -4*s + (i/(strands-1))*8*s;
        const wig = Math.sin(e.wobble*0.025 + e.y*0.18 + i*1.4) * 2*s;
        gctx.beginPath();
        gctx.moveTo(sx, 1.2*s);
        gctx.quadraticCurveTo(sx+wig, 5*s, sx+wig*0.6, 9*s);
        gctx.stroke();
      }
    }
    gctx.restore();

    // remaining-hit indicator for multi-hit animals
    if(e.maxHits>1){
      const remaining = e.maxHits - e.hits;
      const n = e.maxHits;
      const totalW = (n-1)*6;
      for(let i=0;i<n;i++){
        const dx = e.x - totalW/2 + i*6;
        const dy = e.y - e.r - 9;
        gctx.beginPath();
        gctx.arc(dx,dy,2,0,Math.PI*2);
        gctx.fillStyle = i < remaining ? 'rgba(24,21,17,0.75)' : 'rgba(24,21,17,0.15)';
        gctx.fill();
      }
    }
  }

  // ---------- particles (ring pool) ----------
  const P_MAX=256; let pCur=0;
  const particles=[];
  for(let i=0;i<P_MAX;i++) particles.push({alive:false});
  function spawnParticle(x,y,vx,vy,life,r,color){
    const p = particles[pCur]; pCur=(pCur+1)%P_MAX;
    p.alive=true; p.x=x; p.y=y; p.vx=vx; p.vy=vy;
    p.life=life; p.maxLife=life; p.r=r||2; p.color=color||'rgba(44,38,32,0.7)';
  }
  function burst(x,y,color){
    for(let i=0;i<8;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 0.05+Math.random()*0.12;
      spawnParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,500,2,color);
    }
  }
  function splatter(x,y,ang){
    for(let i=0;i<10;i++){
      const a = ang + (Math.random()-0.5)*1.4;           // ±40°
      const sp = 0.08+Math.random()*0.22;
      spawnParticle(x,y, Math.cos(a)*sp, Math.sin(a)*sp, 320+Math.random()*280, 1+Math.random()*2.2);
    }
  }

  function inkBloom(x,y,tint){
    const color = tint || '32,27,22';
    const n = 6 + Math.floor(Math.random()*3);
    const tendrils = [];
    for(let i=0;i<n;i++){
      const a = (i/n)*Math.PI*2 + (Math.random()-0.5)*0.6;
      const dist = 6 + Math.random()*12;
      tendrils.push({
        ox: Math.cos(a)*dist,
        oy: Math.sin(a)*dist*0.75,
        r0: 2+Math.random()*2,
        r1: 12+Math.random()*16,
        delay: Math.random()*160,
        sink: 4+Math.random()*10
      });
    }
    inkBlooms.push({
      x,y,tendrils,color,
      life:0,
      maxLife: 950+Math.random()*350,
      coreR1: 16+Math.random()*8
    });
  }
  function easeOutCubic(t){ return 1-Math.pow(1-t,3); }

  function updateInkBlooms(dt){
    inkBlooms.forEach(b=>{ b.life += dt; });
    inkBlooms = inkBlooms.filter(b=>b.life < b.maxLife);
  }

  function drawInkBlooms(){
    inkBlooms.forEach(b=>{
      const overallT = b.life / b.maxLife;
      const alphaEnv = b.life<140 ? (b.life/140) : Math.max(0, 1-(b.life-140)/(b.maxLife-140));
      // core blob
      const coreProg = easeOutCubic(Math.min(1, b.life/300));
      const coreR = 3 + b.coreR1*coreProg;
      let grd = gctx.createRadialGradient(b.x,b.y,0, b.x,b.y,coreR);
      grd.addColorStop(0, `rgba(${b.color},${0.5*alphaEnv})`);
      grd.addColorStop(1, `rgba(${b.color},0)`);
      gctx.fillStyle = grd;
      gctx.beginPath(); gctx.arc(b.x,b.y,coreR,0,Math.PI*2); gctx.fill();
      // tendrils
      b.tendrils.forEach(t=>{
        const tl = Math.max(0, b.life - t.delay);
        const dur = Math.max(1, b.maxLife - t.delay);
        const prog = Math.min(1, tl/dur);
        const eased = easeOutCubic(prog);
        const r = t.r0 + (t.r1-t.r0)*eased;
        const px = b.x + t.ox*(0.3+eased*1.1);
        const py = b.y + t.oy*(0.3+eased*1.1) + eased*t.sink;
        const a = alphaEnv * (1-eased*0.3);
        const g2 = gctx.createRadialGradient(px,py,0, px,py,r);
        g2.addColorStop(0, `rgba(${b.color},${0.38*a})`);
        g2.addColorStop(1, `rgba(${b.color},0)`);
        gctx.fillStyle = g2;
        gctx.beginPath(); gctx.arc(px,py,r,0,Math.PI*2); gctx.fill();
      });
    });
  }

  // ---------- input / strokes ----------
  let drawing=false;
  function toLocal(e){
    const rect = gCanvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY) - rect.top;
    return {x:cx,y:cy,t:performance.now()};
  }
  function pointerDown(e){
    ensureAudio();
    if(!running || paused) return;
    drawing = true;
    strokePts = [toLocal(e)];
  }
  function pointerMove(e){
    if(!drawing) return;
    const p = toLocal(e);
    const prev = strokePts[strokePts.length-1];
    strokePts.push(p);
    if(prev) lastStrokeAngle = Math.atan2(p.y-prev.y, p.x-prev.x);
    const d = prev? Math.hypot(p.x-prev.x,p.y-prev.y) : 0;
    strokeTrail.push({x:p.x,y:p.y,life:400,maxLife:400,w:Math.max(2, 13-d*0.3)});
    // check enemy collisions along segment
    if(prev){
      enemies.forEach(en=>{
        if(!en.alive) return;
        if(distToSeg(en.x,en.y, prev.x,prev.y, p.x,p.y) < en.r+10){
          hitEnemy(en);
        }
      });
    }
    checkCastMatch();
  }
  function pointerUp(){
    if(!drawing) return;
    drawing = false;
    // evaluate perfect stroke
    if(strokePts.length>4){
      const len = pathLength(strokePts);
      const dur = strokePts[strokePts.length-1].t - strokePts[0].t;
      if(len>90 && dur<450){
        flash('Perfect Stroke!');
      }
    }
    strokePts = [];
  }
  function distToSeg(px,py, x1,y1,x2,y2){
    const dx=x2-x1, dy=y2-y1;
    const lenSq = dx*dx+dy*dy;
    let t = lenSq===0?0:((px-x1)*dx+(py-y1)*dy)/lenSq;
    t = Math.max(0,Math.min(1,t));
    const cx=x1+t*dx, cy=y1+t*dy;
    return Math.hypot(px-cx,py-cy);
  }
  function pathLength(pts){
    let l=0;
    for(let i=1;i<pts.length;i++) l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    return l;
  }

  gCanvas.addEventListener('mousedown', pointerDown);
  gCanvas.addEventListener('mousemove', pointerMove);
  window.addEventListener('mouseup', pointerUp);
  gCanvas.addEventListener('touchstart', e=>{e.preventDefault(); pointerDown(e);}, {passive:false});
  gCanvas.addEventListener('touchmove', e=>{e.preventDefault(); pointerMove(e);}, {passive:false});
  gCanvas.addEventListener('touchend', e=>{e.preventDefault(); pointerUp(e);}, {passive:false});

  function hitEnemy(en){
    if(en.hitCooldown>0) return;
    en.hits += 1;
    en.hitFlash = 140;
    en.hitCooldown = 220;
    shake(3); buzz(10);
    splatter(en.x, en.y, lastStrokeAngle);
    sfx.slash();
    score += en.ptsPerHit;
    spawnFloater(en.x, en.y-en.r-14, '+'+en.ptsPerHit);
    if(en.hits >= en.maxHits){
      killEnemy(en, 0);
    } else {
      inkBloom(en.x, en.y, '32,27,22');
    }
    updateHUD();
  }

  function killEnemy(en, bonusPts, countsForLevel){
    if(countsForLevel===undefined) countsForLevel = true;
    en.alive = false;
    shake(6); buzz(25); freezeT = 50;
    sfx.kill();
    inkBloom(en.x,en.y);
    addStain(en.x,en.y);
    spawnShards(en, lastStrokeAngle);
    score += (bonusPts||0);
    combo++; comboT=2000;
    const comboBonus = Math.min(20,(combo-1)*2);
    if(comboBonus>0){ score += comboBonus; spawnFloater(en.x, en.y-en.r-28, '連 +'+comboBonus); }
    if(combo>=2){
      comboTxt.textContent='連斬 ×'+combo;
      comboTxt.classList.remove('pop'); void comboTxt.offsetWidth; comboTxt.classList.add('pop');
    }
    if(combo>=3) sfx.combo(combo);
    scoreNum.classList.remove('bump'); void scoreNum.offsetWidth; scoreNum.classList.add('bump');
    if(countsForLevel){
      levelKills++;
      if(levelKills>=levelGoal && levelTransition<=0){
        beginLevelClear();
      }
    }
    updateHUD();
  }

  function beginLevelClear(){
    flash('LEVEL '+level+' CLEAR!');
    sfx.clear();
    enemies.forEach(en=>{
      if(en.alive){ en.alive=false; inkBloom(en.x,en.y,'161,58,44'); }
    });
    levelTransition = 2200;
  }

  function startLevel(n){
    level = n;
    levelKills = 0;
    applyLevelConfig();
    spawnTimer = 0;
    updateHUD();
    flash('LEVEL '+level);
    announceNewEnemies();
  }

  // ---------- cast event (trace to cast) ----------
  function triggerCastEvent(){
    if(castEvent) return;
    const cx = W*0.5 + (Math.random()-0.5)*W*0.3;
    const cy = H*0.35;
    const pts = [];
    const n = 4;
    for(let i=0;i<=n;i++){
      pts.push({x: cx + (i-n/2)*22, y: cy + (i%2===0? -18: 18)});
    }
    castEvent = {points:pts, life:5000, maxLife:5000, matched:false};
    promptText.style.display='block';
    promptText.style.left = (cx-90)+'px';
    promptText.style.top = (cy-40)+'px';
    sealBox.classList.add('armed');
  }
  function checkCastMatch(){
    if(!castEvent || castEvent.matched) return;
    if(strokePts.length<5) return;
    // heuristic: count direction reversals in x, and check bbox roughly matches
    let reversals=0, lastDx=0;
    for(let i=1;i<strokePts.length;i++){
      const dx = strokePts[i].x - strokePts[i-1].x;
      if(Math.abs(dx)>2){
        if(lastDx!==0 && Math.sign(dx)!==Math.sign(lastDx)) reversals++;
        lastDx = dx;
      }
    }
    const len = pathLength(strokePts);
    // near the prompt region?
    const near = strokePts.some(p=>Math.hypot(p.x-castEvent.points[2].x, p.y-castEvent.points[2].y) < 120);
    if(reversals>=2 && len>70 && near){
      castEvent.matched = true;
      resolveCast(true);
    }
  }
  function resolveCast(success){
    if(success){
      flash('Trace complete · Thunder!');
      sfx.thunder();
      spawnLightning(); shake(9); buzz(60);
      thunderQueue = enemies.filter(e=>e.alive).sort((a,b)=>b.y-a.y);
      thunderT = 0;
      inkBloom(W/2,H*0.4,'161,58,44');
    }
    castEvent = null;
    promptText.style.display='none';
    sealBox.classList.remove('armed');
    castCooldown = 9000 + Math.random()*4000;
  }

  // ---------- main loop ----------
  function loop(t){
    if(!lastT) lastT=t;
    const dt = Math.min(50, t-lastT);
    lastT = t;
    shakeT = Math.max(0, shakeT-dt);
    if(running && !paused){
      update(dt);
    }
    render();
    requestAnimationFrame(loop);
  }

  function updateFx(dt){
    for(let i=0;i<P_MAX;i++){ const p=particles[i]; if(!p.alive) continue;
      p.vy += 0.0004*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
      if(p.life<=0) p.alive=false;
    }
    strokeTrail.forEach(p=>p.life-=dt);
    strokeTrail = strokeTrail.filter(p=>p.life>0);
    for(let i=0;i<S_MAX;i++){ const s=shards[i]; if(!s.alive) continue;
      s.vy+=0.00035*dt; s.x+=s.vx*dt; s.y+=s.vy*dt; s.rot+=s.vr*dt; s.life-=dt;
      if(s.life<=0) s.alive=false;
    }
    for(let i=0;i<F_MAX;i++){ const f=floaters[i]; if(!f.alive) continue;
      f.y -= 0.03*dt; f.life -= dt;
      if(f.life<=0) f.alive=false;
    }
    if(displayScore<score){
      displayScore = Math.min(score, displayScore + Math.max(0.05*dt, (score-displayScore)*0.012*dt));
      scoreNum.textContent = Math.floor(displayScore);
    }
    if(comboT>0){
      comboT -= dt;
      if(comboT<=0){ combo=0; comboTxt.classList.remove('pop'); }
    }
    flashWhite = Math.max(0, flashWhite-dt);
    bolts.forEach(b=>b.life-=dt);
    bolts = bolts.filter(b=>b.life>0);
    fogs.forEach(f=>{
      f.x += f.v*dt;
      if(f.v>0 && f.x>W+40) f.x = -420*f.s-40;
      if(f.v<0 && f.x<-420*f.s-40) f.x = W+40;
    });
    updateInkBlooms(dt);
  }

  function update(dt){
    updateFx(dt);
    if(freezeT>0){ freezeT-=dt; return; }
    castCooldown -= dt;

    stainFadeT += dt;
    if(stainFadeT>2000){ stainFadeT=0; fadeStains(); }

    if(thunderQueue.length){
      thunderT += dt;
      while(thunderT>=60 && thunderQueue.length){
        thunderT -= 60;
        const ten = thunderQueue.shift();
        if(ten.alive) killEnemy(ten, 6);
      }
    }

    if(levelTransition>0){
      levelTransition -= dt;
      if(levelTransition<=0) startLevel(level+1);
      updateHUD();
      return;
    } else {
      spawnTimer += dt;
      if(spawnTimer>spawnInterval){
        spawnTimer=0; spawnEnemy();
      }
    }
    if(castCooldown<=0 && !castEvent){
      triggerCastEvent();
    }
    if(castEvent){
      castEvent.life -= dt;
      if(castEvent.life<=0) resolveCast(false);
    }

    enemies.forEach(en=>{
      if(!en.alive) return;
      const prevX = en.x;
      en.y += en.speed*dt;
      en.swimT += dt;
      en.x = en.baseX + Math.sin(en.swimT*en.swimFreq + en.swimPhase) * en.swimAmp;
      const dx = en.x - prevX;
      const dy = en.speed*dt;
      const targetAngle = Math.max(-0.55, Math.min(0.55, Math.atan2(dx, dy||1)));
      en.angle += (targetAngle - en.angle) * 0.12;
      en.facing = dx >= 0 ? 1 : -1;
      if(en.hitFlash>0) en.hitFlash -= dt;
      if(en.hitCooldown>0) en.hitCooldown -= dt;
      if(en.y > baseY()){
        en.alive=false;
        lives = Math.max(0, lives-1);
        hp = Math.max(0, hp-14);
        shake(10); buzz(80);
        sfx.hurt();
        healthBar.classList.remove('hit'); void healthBar.offsetWidth; healthBar.classList.add('hit');
        inkBloom(en.x, baseY(), '161,58,44');
        updateHUD();
        if(lives<=0 || hp<=0) gameOver();
      }
    });
    enemies = enemies.filter(e=>e.alive);

    updateHUD();
  }

  function render(){
    gctx.clearRect(0,0,W,H);
    gctx.save();
    if(shakeT>0){
      const k = (shakeT/SHAKE_DUR)*shakePow;
      gctx.translate((Math.random()-0.5)*k, (Math.random()-0.5)*k);
    } else { shakePow=0; }
    // drifting fog (lowest layer)
    if(fogCanvas) fogs.forEach(f=>gctx.drawImage(fogCanvas, f.x, f.y, 420*f.s, 120*f.s));
    // stroke trail (ink brush)
    if(strokeTrail.length>1){
      gctx.lineJoin='round'; gctx.lineCap='round';
      for(let i=1;i<strokeTrail.length;i++){
        const p0=strokeTrail[i-1], p1=strokeTrail[i];
        const alpha = Math.max(0,p1.life/p1.maxLife);
        const w = ((p0.w||3)+(p1.w||3))/2*alpha + 0.5;
        gctx.strokeStyle = 'rgba(44,38,32,'+(0.16*alpha).toFixed(3)+')';
        gctx.lineWidth = w*2.1;
        gctx.beginPath(); gctx.moveTo(p0.x,p0.y); gctx.lineTo(p1.x,p1.y); gctx.stroke();
        if((i*7)%10 < 8){
          gctx.strokeStyle = 'rgba(30,26,20,'+(0.6*alpha).toFixed(3)+')';
          gctx.lineWidth = w;
          gctx.beginPath(); gctx.moveTo(p0.x,p0.y); gctx.lineTo(p1.x,p1.y); gctx.stroke();
        }
      }
    }
    // cast event dotted path
    if(castEvent){
      gctx.strokeStyle = 'rgba(161,58,44,0.65)';
      gctx.lineWidth=1.4;
      gctx.setLineDash([4,5]);
      gctx.beginPath();
      castEvent.points.forEach((p,i)=>{ if(i===0) gctx.moveTo(p.x,p.y); else gctx.lineTo(p.x,p.y); });
      gctx.stroke();
      gctx.setLineDash([]);
      castEvent.points.forEach(p=>{
        gctx.fillStyle='rgba(161,58,44,0.5)';
        gctx.beginPath(); gctx.arc(p.x,p.y,2.4,0,Math.PI*2); gctx.fill();
      });
    }
    enemies.forEach(drawEnemy);
    shards.forEach(s=>{
      if(!s.alive) return;
      const a = s.life/s.maxLife;
      const sc = 1 + (1-a)*s.grow;
      gctx.save();
      gctx.translate(s.x,s.y); gctx.rotate(s.rot); gctx.scale(sc,sc);
      gctx.fillStyle = 'rgba(24,21,17,'+(0.8*a).toFixed(3)+')';
      gctx.beginPath();
      s.poly.forEach((p,i)=>{ if(i===0) gctx.moveTo(p.x,p.y); else gctx.lineTo(p.x,p.y); });
      gctx.closePath(); gctx.fill();
      gctx.restore();
    });
    drawInkBlooms();
    particles.forEach(p=>{
      if(!p.alive) return;
      gctx.fillStyle = p.color;
      gctx.globalAlpha = Math.max(0,p.life/p.maxLife);
      gctx.beginPath(); gctx.arc(p.x,p.y,p.r,0,Math.PI*2); gctx.fill();
      gctx.globalAlpha = 1;
    });
    // score floaters
    gctx.font='600 13px "Songti SC","STSong","Noto Serif SC",serif';
    gctx.textAlign='center';
    floaters.forEach(f=>{
      if(!f.alive) return;
      gctx.fillStyle='rgba(44,38,32,'+(0.85*f.life/f.maxLife).toFixed(3)+')';
      gctx.fillText(f.txt, f.x, f.y);
    });
    gctx.textAlign='start';
    // lightning bolts
    bolts.forEach(b=>{
      const a = b.life/b.maxLife;
      gctx.lineCap='round'; gctx.lineJoin='round';
      gctx.strokeStyle='rgba(161,58,44,'+(0.35*a).toFixed(3)+')';
      gctx.lineWidth=b.w*3.5;
      gctx.beginPath(); b.pts.forEach((p,i)=>{ i?gctx.lineTo(p.x,p.y):gctx.moveTo(p.x,p.y); }); gctx.stroke();
      gctx.strokeStyle='rgba(255,252,240,'+(0.9*a).toFixed(3)+')';
      gctx.lineWidth=b.w;
      gctx.beginPath(); b.pts.forEach((p,i)=>{ i?gctx.lineTo(p.x,p.y):gctx.moveTo(p.x,p.y); }); gctx.stroke();
    });
    // level transition ink wave
    if(levelTransition>0) drawInkWave(1 - levelTransition/2200);
    gctx.restore();
    // danger vignette (screen-fixed)
    if(running && hp<30){
      const breathe = 0.5+0.5*Math.sin(performance.now()*0.004);
      const va = (0.18 + 0.22*(1-hp/30)) * (0.6+0.4*breathe);
      const vg = gctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.45, W/2,H/2,Math.max(W,H)*0.72);
      vg.addColorStop(0,'rgba(161,58,44,0)');
      vg.addColorStop(1,'rgba(161,58,44,'+va.toFixed(3)+')');
      gctx.fillStyle=vg; gctx.fillRect(0,0,W,H);
    }
    // thunder white flash
    if(flashWhite>0){
      gctx.fillStyle='rgba(255,255,250,'+(flashWhite/120*0.75).toFixed(3)+')';
      gctx.fillRect(0,0,W,H);
    }
    // cursor crosshair for mouse (desktop feel), skip on pure touch idle
  }

  function gameOver(){
    sfx.chime();
    running=false;
    const best = loadBest();
    if(score > best.score){
      saveBest({score:score, level:level});
      finalScoreEl.innerHTML = '<span class="record">新紀錄！</span>　SCORE '+score;
    } else {
      finalScoreEl.textContent = 'SCORE '+score+' · 最佳 '+best.score;
    }
    endOverlay.classList.add('show');
  }

  // ---------- buttons ----------
  document.getElementById('startBtn').addEventListener('click', ()=>{
    ensureAudio();
    sfx.chime();
    startOverlay.classList.remove('show');
    resetGame();
    announceNewEnemies();
    running=true; paused=false;
  });
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    ensureAudio();
    endOverlay.classList.remove('show');
    resetGame();
    announceNewEnemies();
    running=true; paused=false;
  });
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    ensureAudio();
    resetGame();
    running=true; paused=false;
    endOverlay.classList.remove('show');
  });
  document.getElementById('pauseBtn').addEventListener('click', (e)=>{
    if(!running) return;
    paused=!paused;
    e.target.textContent = paused? '►':'❚❚';
  });
  const muteBtn=document.getElementById('muteBtn');
  if(muted) muteBtn.classList.add('muted');
  muteBtn.addEventListener('click', ()=>{
    muted=!muted;
    muteBtn.classList.toggle('muted',muted);
    if(masterGain) masterGain.gain.value = muted?0:0.9;
    try{ localStorage.setItem('inkguard_muted', muted?'1':'0'); }catch(e){}
  });

  resize();
  updateHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
